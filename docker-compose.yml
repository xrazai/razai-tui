services:
  postgres:
    image: postgres:16-alpine
    container_name: razai-tui-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: razai_tui
      POSTGRES_USER: razai
      POSTGRES_PASSWORD: razai_dev
    ports:
      - "5432:5432"
    volumes:
      - razai_tui_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U razai -d razai_tui"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  razai_tui_postgres_data:
